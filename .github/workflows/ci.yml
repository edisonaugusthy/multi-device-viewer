name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check extension
        run: npm run compile

      - name: Run unit tests
        run: npm test

      - name: Install browser test runtimes
        run: npx playwright install --with-deps chromium firefox

      - name: Run Chrome and Firefox browser tests
        run: npm run test:e2e

      - name: Build extension
        run: npm run build

      - name: Package extension zip
        run: npm run zip

      - name: Build Firefox extension
        run: npm run build:firefox

      - name: Package Firefox extension and sources
        run: npm run zip:firefox

      - name: Validate Chrome package
        shell: bash
        run: |
          set -euo pipefail
          npm run validate:chrome-zip -- .output/multi-device-viewer-0.2.0-chrome.zip

      - name: Validate Firefox package
        run: npm run validate:firefox-zip -- .output/multi-device-viewer-0.2.0-firefox.zip

      - name: Run Mozilla add-on linter
        run: npm run lint:firefox -- .output/multi-device-viewer-0.2.0-firefox.zip
