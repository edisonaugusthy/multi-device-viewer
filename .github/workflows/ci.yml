name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate extension icons
        run: npm run generate:icons

      - name: Type-check extension
        run: npm run compile

      - name: Build extension
        run: npm run build

      - name: Package extension zip
        run: npm run zip

      - name: Validate Chrome package
        shell: bash
        run: |
          set -euo pipefail
          zip_path="$(find .output -maxdepth 1 -type f -name '*.zip' | sort | tail -n 1)"
          if [[ -z "$zip_path" ]]; then
            echo "No Chrome extension zip found in .output" >&2
            exit 1
          fi
          npm run validate:chrome-zip -- "$zip_path"
